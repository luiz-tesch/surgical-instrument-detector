# YOLOv8 training hyperparameters
# Tuned for GTX 1660 Ti (6GB VRAM)

model: yolov8n.pt       # start with nano; upgrade to yolov8s.pt if VRAM allows
epochs: 100
imgsz: 640
batch: 16               # reduce to 8 if OOM
device: 0               # GPU 0
workers: 4
patience: 20            # early stopping

# Optimizer
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3

# Augmentation (surgical video specific — reduce aggressive flips)
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0
translate: 0.1
scale: 0.5
flipud: 0.0             # surgical instruments have orientation
fliplr: 0.5
mosaic: 1.0
mixup: 0.0

# Logging
project: runs/train
name: surgical_instrument_yolov8
save: true
plots: true
