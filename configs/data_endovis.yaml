# Dataset config for EndoVis 2017 (Zenodo preprocessed version)
# Source: https://zenodo.org/records/10527017
# License: CC-BY-4.0 — cite Sun (2024) + Allan et al. (2019)
#
# Pixel value → class mapping (from instrument_type_mapping.json):
#   0: background
#   1: Bipolar Forceps      → YOLO class 0
#   2: Prograsp Forceps     → YOLO class 1
#   3: Large Needle Driver  → YOLO class 2
#   4: Vessel Sealer        → YOLO class 3
#   5: Grasping Retractor   → YOLO class 4
#   6: Monopolar Curved Scissors → YOLO class 5
#   (7: Other — skipped by default in prepare script)

path: ../data/endovis2017
train: train/images
val: val/images
test: test/images

nc: 6
names:
  0: bipolar_forceps
  1: prograsp_forceps
  2: large_needle_driver
  3: vessel_sealer
  4: grasping_retractor
  5: monopolar_curved_scissors
