# Dataset config for Cholec80 instrument detection
# Cholec80: 80 laparoscopic cholecystectomy videos, 7 instrument classes
# Source: http://camma.u-strasbg.fr/datasets

path: ../data/cholec80
train: train/images
val: val/images
test: test/images

nc: 7
names:
  0: grasper
  1: bipolar
  2: hook
  3: scissors
  4: clipper
  5: irrigator
  6: specimen_bag
